[defaults]
interpreter_python   = auto_silent
retry_files_enabled  = False
host_key_checking    = False
timeout              = 30
forks                = 20
stdout_callback      = yaml
callbacks_enabled    = profile_tasks

# AWX clones the repo to /runner/project/ — bundled collection is found here
collections_paths    = /runner/project/collections:/usr/share/ansible/collections

[inventory]
# patchmon plugin must be first; auto handles the rest
enable_plugins = patchmon.dynamic_inventory.dynamic_inventory, auto, yaml, ini

[ssh_connection]
pipelining = True
ssh_args   = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no
